<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventroy - กระเป๋าของฉัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- Base variables -->

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Inbox Specific Styles -->
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --card-hover-bg: rgba(255, 255, 255, 0.1);
            /* Use global variables for dynamic theming */
            --primary-gradient: linear-gradient(135deg, var(--primary, #FF512F) 0%, var(--secondary, #DD2476) 100%);
        }

        body {
            /* Use global background variable, fallback to dark */
            background: var(--bg-primary, #0f0c29);
            min-height: 100vh;
            color: var(--text-primary, #fff);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 0;
            background-attachment: fixed;
        }

        .inbox-page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Ambient Light Effects */
        .ambient-light {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(100px);
            opacity: 0.4;
        }

        .light-1 {
            top: -100px;
            left: -100px;
            background: var(--primary, #FF512F);
        }

        .light-2 {
            bottom: -100px;
            right: -100px;
            background: var(--secondary, #DD2476);
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Grid Layout */
        .inbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Card Item */
        .inbox-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        .inbox-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: var(--card-hover-bg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Read State (Greyish) */
        .inbox-card.read {
            opacity: 0.7;
            filter: grayscale(0.8);
            transition: all 0.3s;
        }

        .inbox-card.read:hover {
            opacity: 1;
            filter: grayscale(0);
        }

        /* Unread Glow */
        .inbox-card.unread::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin: 15px;
            box-shadow: 0 0 10px #00ff88;
            z-index: 10;
        }

        .inbox-card.unread {
            border-color: rgba(0, 255, 136, 0.3);
            background: linear-gradient(145deg, rgba(0, 255, 136, 0.05) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-date {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-action {
            margin-top: auto;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .inbox-card:hover .card-action {
            color: #fff;
            background: var(--primary-gradient);
        }

        /* Detail View */
        .detail-viewer {
            background: rgba(20, 20, 30, 0.8);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(20px);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 30px;
        }

        .detail-img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .detail-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .detail-meta {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        .secret-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .secret-label {
            display: block;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .code-display {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #00ff88;
            border: 1px solid #333;
            margin-bottom: 20px;
            word-break: break-all;
            position: relative;
        }

        .btn-copy-lg {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(221, 36, 118, 0.4);
        }

        .btn-copy-lg:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(221, 36, 118, 0.6);
            filter: brightness(1.1);
        }

        .btn-copy-lg:active {
            transform: translateY(0);
        }

        /* Utils */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <!-- Ambient Background -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="inbox-page-container">
        <div class="page-header">
            <h1 class="page-title">
                <i data-lucide="package"></i>
                รายการสั่งซื้อของฉัน
            </h1>
            <a href="/" class="btn-home">
                <i data-lucide="home"></i> กลับหน้าหลัก
            </a>
        </div>

        <div id="loadingView" class="text-center py-8">
            <div style="font-size: 2rem; animation: bounce 1s infinite;"><i data-lucide="loader-2"
                    class="animate-spin"></i></div>
            <p style="margin-top: 10px; color: rgba(255,255,255,0.7);">กำลังโหลดข้อมูล...</p>
        </div>

        <!-- List View -->
        <div id="inboxListView" class="inbox-grid hidden">
            <!-- Items rendered here -->
        </div>

        <!-- Detail View -->
        <div id="inboxDetailView" class="detail-viewer hidden">
            <button class="btn-home" onclick="showInboxList()" style="margin-bottom: 30px;">
                <i data-lucide="arrow-left"></i> กลับหน้ารายการ
            </button>

            <div class="detail-header">
                <img src="" alt="" id="detailImg" class="detail-img">
                <div>
                    <h2 id="detailName" class="detail-title">Product Name</h2>
                    <div class="detail-meta">
                        <span style="display:inline-flex; align-items:center; gap:5px;"><i data-lucide="calendar"
                                style="width:16px;"></i> สั่งซื้อเมื่อ: </span>
                        <span id="detailDate">Date</span>
                    </div>
                </div>
            </div>

            <div class="secret-area">
                <span class="secret-label" style="display:flex; align-items:center; gap:5px;"><i data-lucide="key"></i>
                    ข้อมูลสินค้า (Key / ID)</span>
                <div class="code-display" id="detailKey">...</div>

                <button class="btn-copy-lg" onclick="copyToClipboard(document.getElementById('detailKey').innerText)">
                    <i data-lucide="copy"></i> คัดลอกข้อมูล (Copy)
                </button>

                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <h4 style="color: #ffcc00; margin-bottom: 10px; display:flex; align-items:center; gap:5px;"><i
                            data-lucide="alert-triangle"></i> คำเตือน / Instructions</h4>
                    <p style="color: rgba(255,255,255,0.7); line-height: 1.6; font-size: 0.95rem;">
                        กรุณาเก็บรักษาข้อมูลนี้ไว้เป็นความลับ หากพบปัญหาในการใช้งาน
                        กรุณาติดต่อแอดมินทันทีและแนบหลักฐานการสั่งซื้อ
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Logic -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('webshop_token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            lucide.createIcons(); // Init static icons
            loadInboxData();
        });

        async function loadInboxData() {
            try {
                const response = await fetch(`${API_URL}/api/inbox`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('webshop_token')}`
                    }
                });
                const orders = await response.json();

                document.getElementById('loadingView').classList.add('hidden');
                document.getElementById('inboxListView').classList.remove('hidden');

                renderInboxPageList(orders);
            } catch (error) {
                console.error(error);
                document.getElementById('loadingView').innerHTML = '<p style="color: #ff4444;">โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</p>';
            }
        }

        function renderInboxPageList(orders) {
            const container = document.getElementById('inboxListView');
            container.innerHTML = '';
            container.className = 'inbox-grid'; // Ensure grid class is set

            if (orders.length === 0) {
                container.className = ''; // Remove grid for empty state
                container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i data-lucide="inbox" style="width:64px; height:64px;"></i></div>
                <h3 class="empty-text">คุณยังไม่มีสินค้าในกระเป๋า</h3>
                <a href="/" class="btn-home" style="display:inline-flex; background: var(--primary-gradient);">
                    <i data-lucide="shopping-cart"></i> ไปเลือกซื้อสินค้าเลย
                </a>
            </div>
            `;
                return;
            }

            orders.forEach(order => {
                const date = new Date(order.created_at).toLocaleString('th-TH');
                const isUnread = order.is_read === 0;

                const card = document.createElement('div');
                card.className = `inbox-card ${isUnread ? 'unread' : 'read'}`;
                card.onclick = () => showInboxDetail(order);

                card.innerHTML = `
                    <img src="${order.product_image || 'assets/logo.png'}" class="card-img" alt="Product">
                    <div class="card-info">
                        <div class="card-title">${order.product_name}</div>
                        <div class="card-date" style="display:flex; align-items:center; gap:4px;"><i data-lucide="clock" style="width:14px;"></i> ${date}</div>
                    </div>
                    <div class="card-action" style="display:flex; align-items:center; justify-content:center; gap:5px;">
                        ${isUnread ? '<i data-lucide="sparkles"></i> กดเพื่อเปิดดูข้อมูล' : '<i data-lucide="check-circle"></i> ดูข้อมูลสินค้า'}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        async function showInboxDetail(order) {
            document.getElementById('inboxListView').classList.add('hidden');
            document.getElementById('inboxDetailView').classList.remove('hidden');

            document.getElementById('detailImg').src = order.product_image || 'assets/logo.png';
            document.getElementById('detailName').textContent = order.product_name;
            document.getElementById('detailDate').textContent = new Date(order.created_at).toLocaleString('th-TH');
            
            let displayData = order.key_data || 'No Data';
            let isInvite = false;
            if (displayData.startsWith('{')) {
                try {
                    const parsed = JSON.parse(displayData);
                    if (parsed.type === 'invite') {
                        isInvite = true;
                        const isSent = parsed.status === 'sent';
                        document.getElementById('detailKey').innerHTML = `
                            <div style="font-family: 'Kanit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 10px; width: 100%;">
                                <div style="width: 64px; height: 64px; border-radius: 50%; background: ${isSent ? 'rgba(16, 185, 129, 0.1)' : 'rgba(59, 130, 246, 0.1)'}; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${isSent ? '#10b981' : '#3b82f6'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/>
                                        <path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"/>
                                    </svg>
                                </div>
                                <span style="color: rgba(255,255,255,0.4); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Target Email</span>
                                <strong style="color: #fff; font-size: 1.4rem; margin-bottom: 30px; font-weight: 500; letter-spacing: 0.5px;">${parsed.email}</strong>
                                
                                <div style="display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: ${isSent ? 'rgba(16, 185, 129, 0.08)' : 'rgba(245, 158, 11, 0.08)'}; padding: 12px 28px; border-radius: 12px; border: 1px solid ${isSent ? 'rgba(16, 185, 129, 0.15)' : 'rgba(245, 158, 11, 0.15)'}; width: fit-content; margin: 0 auto;">
                                    <div style="width: 10px; height: 10px; border-radius: 50%; background: ${isSent ? '#10b981' : '#f59e0b'}; box-shadow: 0 0 12px ${isSent ? '#10b981' : '#f59e0b'}; flex-shrink: 0;"></div>
                                    <span style="color: ${isSent ? '#10b981' : '#f59e0b'}; font-size: 1.05rem; font-weight: 500; white-space: nowrap;">
                                        ${isSent ? 'Invite Sent Successfully' : 'Pending Admin Action'}
                                    </span>
                                </div>

                                <p style="color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-top: 30px; text-align: center; max-width: 80%; font-weight: 300; line-height: 1.5;">
                                    ${isSent ? 'Invite sent successfully. Check your email inbox.' : 'เมื่อแอดมินดำเนินการเรียบร้อยแล้ว คุณจะได้รับอีเมลคำเชิญในกล่องจดหมายของคุณ'}
                                </p>
                            </div>
                        `;
                    }
                } catch(e) {}
            }
            
            if (!isInvite) {
                document.getElementById('detailKey').innerText = displayData;
            }

            // Hide the copy button if it's an invite
            const copyBtn = document.querySelector('.btn-copy-lg');
            if (copyBtn) {
                if (isInvite) {
                    copyBtn.classList.add('hidden');
                } else {
                    copyBtn.classList.remove('hidden');
                }
            }

            if (order.is_read === 0) {
                try {
                    await fetch(`${API_URL}/api/inbox/${order.id}/read`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('webshop_token')}`
                        }
                    });
                } catch (e) { }
            }
        }

        function showInboxList() {
            document.getElementById('inboxDetailView').classList.add('hidden');
            document.getElementById('inboxListView').classList.remove('hidden');
            loadInboxData(); // Refresh to update read status
        }
    </script>
</body>

</html>
